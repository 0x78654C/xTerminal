name: Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    env:
      SOLUTION: Shell.sln
      PROJECT: Shell\Shell.csproj
      ASSEMBLY_INFO: Shell\Properties\AssemblyInfo.cs
      ARTIFACT_NAME: xTerminal
      DEFAULT_VERSION: v2.2.0

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # ── Determine release type from commit message ──────────────────────────
    - name: Determine release type
      id: type
      shell: pwsh
      run: |
        $msg = "${{ github.event.head_commit.message }}"
        if ($msg -match '(?i)^(fix|bug|hotfix|patch)(\(.*?\))?[:\s]') {
          echo "kind=bugfix" >> $env:GITHUB_OUTPUT
        } else {
          echo "kind=feature" >> $env:GITHUB_OUTPUT
        }

    # ── Compute next version from latest tag ────────────────────────────────
    - name: Compute next version
      id: ver
      shell: pwsh
      run: |
        $kind = "${{ steps.type.outputs.kind }}"

        # Fetch all tags
        git fetch --tags

        # Find the latest vX.X.X or vX.X.X.X tag (semver-style)
        $latest = git tag --list 'v*' --sort=-version:refname |
                  Where-Object { $_ -match '^v\d+\.\d+(\.\d+){1,2}$' } |
                  Select-Object -First 1

        if (-not $latest) {
          $latest = $env:DEFAULT_VERSION
        }

        Write-Host "Latest tag: $latest"
        $parts = $latest.TrimStart('v') -split '\.'

        $major = [int]$parts[0]
        $minor = [int]$parts[1]
        $feat  = if ($parts.Count -ge 3) { [int]$parts[2] } else { 0 }
        $patch = if ($parts.Count -ge 4) { [int]$parts[3] } else { 0 }

        if ($kind -eq 'feature') {
          $feat += 1
          $patch = 0
          $newVer  = "$major.$minor.$feat"
          $asmVer  = "$major.$minor.$feat.0"
          $tagName = "v$newVer"
        } else {
          $patch += 1
          $newVer  = "$major.$minor.$feat.$patch"
          $asmVer  = $newVer
          $tagName = "v$newVer"
        }

        Write-Host "New version: $newVer  (assembly: $asmVer)"
        echo "new_ver=$newVer"   >> $env:GITHUB_OUTPUT
        echo "asm_ver=$asmVer"   >> $env:GITHUB_OUTPUT
        echo "tag_name=$tagName" >> $env:GITHUB_OUTPUT

    # ── Update AssemblyInfo.cs ───────────────────────────────────────────────
    - name: Update AssemblyInfo.cs
      shell: pwsh
      run: |
        $asmVer = "${{ steps.ver.outputs.asm_ver }}"
        $file   = "$env:ASSEMBLY_INFO"
        $content = Get-Content $file -Raw
        $content = $content -replace 'AssemblyVersion\("[^"]*"\)',     "AssemblyVersion(`"$asmVer`")"
        $content = $content -replace 'AssemblyFileVersion\("[^"]*"\)', "AssemblyFileVersion(`"$asmVer`")"
        Set-Content $file $content -NoNewline

    # ── Publish self-contained (not single-file) for win-x64 ────────────────
    - name: Publish win-x64
      run: >
        dotnet publish ${{ env.PROJECT }}
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishSingleFile=false
        -o publish\win-x64

    # ── Publish self-contained (not single-file) for win-x86 ────────────────
    - name: Publish win-x86
      run: >
        dotnet publish ${{ env.PROJECT }}
        -c Release
        -r win-x86
        --self-contained true
        -p:PublishSingleFile=false
        -o publish\win-x86

    # ── Pack each build with README.md into a zip ────────────────────────────
    - name: Pack archives
      shell: pwsh
      run: |
        $ver = "${{ steps.ver.outputs.new_ver }}"
        Copy-Item README.md publish\win-x64\README.md
        Copy-Item README.md publish\win-x86\README.md
        Compress-Archive -Path publish\win-x64\* -DestinationPath "$env:ARTIFACT_NAME-$ver-win-x64.zip"
        Compress-Archive -Path publish\win-x86\* -DestinationPath "$env:ARTIFACT_NAME-$ver-win-x86.zip"

    # ── Commit version bump and create tag ───────────────────────────────────
    - name: Commit version and tag
      shell: pwsh
      run: |
        $tagName = "${{ steps.ver.outputs.tag_name }}"
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add $env:ASSEMBLY_INFO
        git commit -m "chore: bump version to $tagName [skip ci]"
        # Only create tag if it does not already exist
        if (git tag --list $tagName) {
          Write-Warning "Tag $tagName already exists; skipping tag creation."
        } else {
          git tag $tagName
          git push origin $tagName
        }
        git push origin HEAD:main

    # ── Create GitHub release ────────────────────────────────────────────────
    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.ver.outputs.tag_name }}
        name: ${{ env.ARTIFACT_NAME }} ${{ steps.ver.outputs.new_ver }}
        body: |
          ## ${{ env.ARTIFACT_NAME }} ${{ steps.ver.outputs.new_ver }}

          **Release type:** ${{ steps.type.outputs.kind }}

          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
        files: |
          ${{ env.ARTIFACT_NAME }}-${{ steps.ver.outputs.new_ver }}-win-x64.zip
          ${{ env.ARTIFACT_NAME }}-${{ steps.ver.outputs.new_ver }}-win-x86.zip
        generate_release_notes: true
